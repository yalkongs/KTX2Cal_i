name: KTXCalendar
options:
  bundleIdPrefix: com.yalkongs
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true

settings:
  base:
    SWIFT_VERSION: "5.9"
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: "1"
    DEVELOPMENT_TEAM: "B22BP425H4"

schemes:
  KTXCalendar:
    build:
      targets:
        KTXCalendar: all
        KTXCalendarShareExtension: [build]
    run:
      config: Debug
    archive:
      config: Release

targets:

  # ── 메인 앱 ────────────────────────────────────────────
  KTXCalendar:
    type: application
    platform: iOS
    sources:
      - path: Sources/KTXCalendar
      - path: Shared

    entitlements:
      path: Resources/KTXCalendar.entitlements
    info:
      path: Resources/Info.plist
      properties:
        CFBundleName: KTX2Cal
        CFBundleDisplayName: KTX2Cal
        CFBundleIdentifier: com.yalkongs.KTXCalendar
        CFBundleVersion: "1"
        CFBundleShortVersionString: "1.0.0"
        UILaunchStoryboardName: ""
        CFBundleIcons:
          CFBundlePrimaryIcon:
            CFBundleIconName: AppIcon
        UIApplicationSupportsIndirectInputEvents: true
        NSPhotoLibraryUsageDescription: "KTX 승차권 이미지를 읽기 위해 사진 접근이 필요합니다."
        NSCameraUsageDescription: "KTX 승차권을 촬영하기 위해 카메라 접근이 필요합니다."
        NSCalendarsUsageDescription: "KTX 일정을 캘린더에 추가하기 위해 접근이 필요합니다."
        NSCalendarsFullAccessUsageDescription: "KTX 승차권 정보를 구글 캘린더에 저장하기 위해 접근이 필요합니다."
    dependencies:
      - target: KTXCalendarShareExtension
        embed: true
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.yalkongs.KTXCalendar
        PRODUCT_NAME: KTXCalendar
        INFOPLIST_FILE: Resources/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon

  # ── Share Extension ────────────────────────────────────
  KTXCalendarShareExtension:
    type: app-extension
    platform: iOS
    sources:
      - path: Sources/ShareExtension
      - path: Shared
    entitlements:
      path: Resources/ShareExtension.entitlements
    info:
      path: Resources/ShareExtension-Info.plist
      properties:
        CFBundleName: KTX2Cal 공유
        CFBundleDisplayName: KTX2Cal
        CFBundleIdentifier: com.yalkongs.KTXCalendar.ShareExtension
        CFBundleVersion: "1"
        CFBundleShortVersionString: "1.0.0"
        NSCalendarsUsageDescription: "KTX 일정을 캘린더에 추가하기 위해 접근이 필요합니다."
        NSCalendarsFullAccessUsageDescription: "KTX 승차권 정보를 구글 캘린더에 저장하기 위해 접근이 필요합니다."
        NSExtension:
          NSExtensionPointIdentifier: com.apple.share-services
          NSExtensionPrincipalClass: $(PRODUCT_MODULE_NAME).ShareViewController
          NSExtensionAttributes:
            NSExtensionActivationRule:
              NSExtensionActivationSupportsText: true
              NSExtensionActivationSupportsImageWithMaxCount: 1
              NSExtensionActivationSupportsWebURLWithMaxCount: 0
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.yalkongs.KTXCalendar.ShareExtension
        PRODUCT_NAME: KTXCalendarShareExtension
        INFOPLIST_FILE: Resources/ShareExtension-Info.plist
